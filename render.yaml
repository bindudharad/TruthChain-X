services:
  - type: web
    name: truthchain-x
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: HOSTNAME=0.0.0.0 PORT=$PORT npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMMA_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: NEMOTRON_API_KEY
        sync: false
      - key: CHAIN_RPC_URL
        sync: false
      - key: CHAIN_PRIVATE_KEY
        sync: false
      - key: CHAIN_CONTRACT_ADDRESS
        sync: false
      - key: JWT_SECRET
        sync: false
