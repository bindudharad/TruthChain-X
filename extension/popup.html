<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TruthChain-X</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 360px;
        background: linear-gradient(180deg, #0b1220 0%, #020617 100%);
        color: #e5eefc;
        font-family: Inter, Arial, sans-serif;
      }
      .wrap { padding: 16px; }
      .header { display: flex; align-items: center; gap: 10px; }
      .logo {
        width: 38px; height: 38px; border-radius: 12px;
        display: grid; place-items: center; background: #67e8f9; color: #020617; font-weight: 800;
      }
      h1 { margin: 0; font-size: 18px; }
      p { margin: 0; }
      .muted { color: #94a3b8; font-size: 12px; line-height: 1.55; }
      .card {
        margin-top: 14px; padding: 14px; border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.05);
      }
      textarea {
        width: 100%; min-height: 86px; resize: vertical; border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.10); background: rgba(2,6,23,0.62);
        color: #e5eefc; padding: 12px; outline: none;
      }
      textarea:focus { border-color: rgba(103,232,249,0.45); box-shadow: 0 0 0 3px rgba(103,232,249,0.08); }
      button {
        border: 0; cursor: pointer; border-radius: 12px; padding: 11px 12px;
        font-weight: 700; transition: transform 160ms ease, background 180ms ease;
      }
      button:hover { transform: translateY(-1px); }
      .primary { width: 100%; margin-top: 10px; background: #67e8f9; color: #020617; }
      .secondary { background: rgba(255,255,255,0.06); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.10); }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .score { font-size: 42px; font-weight: 800; letter-spacing: -0.05em; }
      .badge { border-radius: 999px; padding: 5px 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
      .safe { background: rgba(16,185,129,0.15); color: #bbf7d0; }
      .warning { background: rgba(245,158,11,0.15); color: #fde68a; }
      .danger { background: rgba(244,63,94,0.15); color: #fecdd3; }
      .bar { height: 8px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.10); }
      .fill { height: 100%; width: 0%; border-radius: inherit; background: #67e8f9; transition: width 420ms ease; }
      .error { color: #fecdd3; font-size: 12px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="logo">TC</div>
        <div>
          <h1>TruthChain-X</h1>
          <p class="muted">Analyze links, images, and selected text.</p>
        </div>
      </div>

      <div class="card">
        <label class="muted" for="input">Paste content or URL</label>
        <textarea id="input" placeholder="Paste suspicious URL or text..."></textarea>
        <button id="analyze" class="primary">Analyze</button>
        <p id="error" class="error"></p>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <p class="muted">Trust score</p>
            <div id="score" class="score">--</div>
          </div>
          <span id="verdict" class="badge warning">No scan</span>
        </div>
        <div class="bar"><div id="fill" class="fill"></div></div>
        <p id="explanation" class="muted" style="margin-top:12px;">Right-click page content or paste text above to scan.</p>
      </div>

      <div class="card row">
        <button id="scanPage" class="secondary">Scan active page</button>
        <button id="openApp" class="secondary">Open app</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
