<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TruthChain-X</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        width: 360px;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 28%),
          linear-gradient(180deg, #0b0f1a 0%, #0f1726 100%);
        color: #e5eefc;
        font-family: Inter, Arial, sans-serif;
      }
      .wrap {
        padding: 16px;
      }
      .panel {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 14px;
        margin-top: 12px;
        box-shadow: 0 12px 30px rgba(5, 10, 20, 0.28);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 700;
      }
      .danger { background: rgba(239,68,68,0.16); color: #fecaca; }
      .warning { background: rgba(245,158,11,0.16); color: #fde68a; }
      .safe { background: rgba(16,185,129,0.16); color: #bbf7d0; }
      .meter {
        --value: 0deg;
        width: 132px;
        height: 132px;
        margin: 14px auto 0;
        border-radius: 999px;
        background: conic-gradient(var(--meter-color, #f97316) var(--value), rgba(255,255,255,0.08) 0);
        display: grid;
        place-items: center;
        transition: background 240ms ease;
      }
      .meter::after {
        content: "";
        width: 94px;
        height: 94px;
        border-radius: 999px;
        background: #0f1726;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        position: absolute;
      }
      .meter-wrap {
        position: relative;
        display: grid;
        place-items: center;
      }
      .meter-value {
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .meter-value strong {
        display: block;
        font-size: 30px;
      }
      ul {
        margin: 10px 0 0;
        padding-left: 18px;
      }
      li {
        margin-bottom: 7px;
        font-size: 13px;
        color: #d6e2f4;
      }
      .muted {
        color: #94a3b8;
        font-size: 12px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }
      button {
        border: none;
        border-radius: 12px;
        padding: 11px 12px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }
      button:hover { transform: translateY(-1px); }
      .primary {
        color: white;
        background: linear-gradient(90deg, #06b6d4, #8b5cf6);
        box-shadow: 0 12px 28px rgba(56, 189, 248, 0.24);
      }
      .secondary {
        color: #dbeafe;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
      }
      .pulse {
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 rgba(239,68,68,0); }
        50% { box-shadow: 0 0 0 8px rgba(239,68,68,0.08); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <div>
          <div class="muted">TruthChain-X</div>
          <h2 style="margin:6px 0 0;font-size:21px;">Phishing Shield</h2>
        </div>
        <div id="statusBadge" class="badge warning">Checking...</div>
      </div>

      <div class="panel">
        <div class="meter-wrap">
          <div id="meter" class="meter">
            <div class="meter-value">
              <strong id="score">--</strong>
              <span class="muted">Risk score</span>
            </div>
          </div>
        </div>
        <div style="margin-top:14px;text-align:center;">
          <div id="attackType" style="font-size:14px;font-weight:700;">Waiting for analysis</div>
          <div id="summary" class="muted" style="margin-top:4px;">Open a page to run the phishing detector.</div>
        </div>
        <div class="actions">
          <button id="scanNow" class="primary">Scan again</button>
          <button id="copyReport" class="secondary">Copy report</button>
        </div>
      </div>

      <div class="panel">
        <strong>Why this was flagged</strong>
        <ul id="reasons">
          <li>No scan yet.</li>
        </ul>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
